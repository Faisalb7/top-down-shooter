<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TOP-DOWN SHOOTER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
// SETUP
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

// ============================================================
// INPUT
// ============================================================
const keys = new Set();
const mouse = { x: W/2, y: H/2, down: false, worldX: 0, worldY: 0 };

window.addEventListener('keydown', e => { keys.add(e.code); e.preventDefault(); });
window.addEventListener('keyup', e => keys.delete(e.code));
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const scaleX = W / r.width, scaleY = H / r.height;
  mouse.x = (e.clientX - r.left) * scaleX;
  mouse.y = (e.clientY - r.top) * scaleY;
});
canvas.addEventListener('mousedown', () => mouse.down = true);
canvas.addEventListener('mouseup', () => mouse.down = false);
window.addEventListener('blur', () => { keys.clear(); mouse.down = false; });

// ============================================================
// CAMERA
// ============================================================
const camera = { x: 0, y: 0, shakeX: 0, shakeY: 0, shakeIntensity: 0 };

function cameraUpdate(player, worldSize) {
  const tx = player.x - W/2, ty = player.y - H/2;
  const maxX = worldSize - W, maxY = worldSize - H;
  camera.x += (Math.max(0, Math.min(maxX, tx)) - camera.x) * 0.1;
  camera.y += (Math.max(0, Math.min(maxY, ty)) - camera.y) * 0.1;
  if (camera.shakeIntensity > 0.2) {
    camera.shakeX = (Math.random() - 0.5) * camera.shakeIntensity;
    camera.shakeY = (Math.random() - 0.5) * camera.shakeIntensity;
    camera.shakeIntensity *= 0.85;
  } else {
    camera.shakeX = 0; camera.shakeY = 0; camera.shakeIntensity = 0;
  }
}

function worldToScreen(wx, wy) {
  return {
    x: Math.round(wx - camera.x + camera.shakeX),
    y: Math.round(wy - camera.y + camera.shakeY)
  };
}

function screenToWorld(sx, sy) {
  return { x: sx + camera.x - camera.shakeX, y: sy + camera.y - camera.shakeY };
}

// ============================================================
// PARTICLES
// ============================================================
const particles = [];

function spawnParticles(x, y, count, colors, speed, life, size, gravity = 0, shrink = true) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = speed * (0.5 + Math.random() * 0.5);
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life, maxLife: life,
      size: size * (0.5 + Math.random() * 0.5),
      color: colors[Math.floor(Math.random() * colors.length)],
      gravity, shrink
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.gravity * dt;
  }
}

function renderParticles() {
  for (const p of particles) {
    const t = p.life / p.maxLife;
    const s = p.shrink ? p.size * t : p.size;
    const { x, y } = worldToScreen(p.x, p.y);
    ctx.globalAlpha = t;
    ctx.fillStyle = p.color;
    ctx.fillRect(x - s/2, y - s/2, s, s);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// MUZZLE FLASH
// ============================================================
const muzzleFlashes = [];

function spawnMuzzleFlash(x, y, angle) {
  muzzleFlashes.push({ x, y, angle, life: 0.06, maxLife: 0.06 });
}

function updateMuzzleFlashes(dt) {
  for (let i = muzzleFlashes.length - 1; i >= 0; i--) {
    muzzleFlashes[i].life -= dt;
    if (muzzleFlashes[i].life <= 0) muzzleFlashes.splice(i, 1);
  }
}

function renderMuzzleFlashes() {
  for (const f of muzzleFlashes) {
    const t = f.life / f.maxLife;
    const { x, y } = worldToScreen(f.x, f.y);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(f.angle);
    ctx.globalAlpha = t;
    const sz = 8 * t + 4;
    // Star shape
    ctx.fillStyle = '#FFE000';
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(-1, -sz, 2, sz * 2);
      ctx.rotate(Math.PI / 4);
    }
    ctx.fillStyle = '#FFF';
    ctx.fillRect(-3, -3, 6, 6);
    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// OBSTACLES
// ============================================================
function rectRect(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function resolveEntityObstacle(entity, obstacles) {
  const hw = entity.w / 2, hh = entity.h / 2;
  for (const obs of obstacles) {
    if (rectRect(entity.x - hw, entity.y - hh, entity.w, entity.h, obs.x, obs.y, obs.w, obs.h)) {
      const overlapLeft = (entity.x - hw) - (obs.x + obs.w);
      const overlapRight = (obs.x) - (entity.x + hw);
      const overlapTop = (entity.y - hh) - (obs.y + obs.h);
      const overlapBottom = (obs.y) - (entity.y + hh);
      const minOverlap = Math.min(Math.abs(overlapLeft), Math.abs(overlapRight), Math.abs(overlapTop), Math.abs(overlapBottom));
      if (minOverlap === Math.abs(overlapLeft)) entity.x = obs.x + obs.w + hw;
      else if (minOverlap === Math.abs(overlapRight)) entity.x = obs.x - hw;
      else if (minOverlap === Math.abs(overlapTop)) entity.y = obs.y + obs.h + hh;
      else entity.y = obs.y - hh;
    }
  }
}

function renderObstacles(obstacles, bgColor) {
  const dark = shadeColor(bgColor, -30);
  const light = shadeColor(bgColor, 40);
  for (const obs of obstacles) {
    const { x, y } = worldToScreen(obs.x, obs.y);
    ctx.fillStyle = dark;
    ctx.fillRect(x + 3, y + 3, obs.w, obs.h);
    ctx.fillStyle = obs.color || '#555';
    ctx.fillRect(x, y, obs.w, obs.h);
    ctx.fillStyle = light;
    ctx.fillRect(x, y, obs.w, 3);
    ctx.fillRect(x, y, 3, obs.h);
    ctx.fillStyle = dark;
    ctx.fillRect(x + obs.w - 3, y, 3, obs.h);
    ctx.fillRect(x, y + obs.h - 3, obs.w, 3);
  }
}

function shadeColor(hex, pct) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  let r = parseInt(hex.substring(0,2),16);
  let g = parseInt(hex.substring(2,4),16);
  let b = parseInt(hex.substring(4,6),16);
  r = Math.min(255,Math.max(0,r+pct));
  g = Math.min(255,Math.max(0,g+pct));
  b = Math.min(255,Math.max(0,b+pct));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ============================================================
// PLAYER
// ============================================================
function createPlayer(x, y) {
  return {
    x, y, w: 20, h: 20,
    speed: 180,
    hp: 100, maxHp: 100,
    aimAngle: 0,
    fireTimer: 0, fireRate: 0.15,
    walkCycle: 0,
    gunRecoil: 0,
    iframes: 0,
    alive: true,
    score: 0,
    color: '#4AF'
  };
}

function updatePlayer(player, dt, bullets, obstacles, worldSize) {
  if (!player.alive) return;

  // Movement
  let dx = 0, dy = 0;
  if (keys.has('ArrowLeft') || keys.has('KeyA')) dx -= 1;
  if (keys.has('ArrowRight') || keys.has('KeyD')) dx += 1;
  if (keys.has('ArrowUp') || keys.has('KeyW')) dy -= 1;
  if (keys.has('ArrowDown') || keys.has('KeyS')) dy += 1;
  const moving = dx !== 0 || dy !== 0;
  if (moving) {
    const len = Math.sqrt(dx*dx + dy*dy);
    dx /= len; dy /= len;
    player.x += dx * player.speed * dt;
    player.y += dy * player.speed * dt;
    player.walkCycle += dt * 8;
  }

  // World bounds
  const hw = player.w/2, hh = player.h/2;
  player.x = Math.max(hw, Math.min(worldSize - hw, player.x));
  player.y = Math.max(hh, Math.min(worldSize - hh, player.y));

  // Obstacle collision
  resolveEntityObstacle(player, obstacles);

  // Aim
  const wm = screenToWorld(mouse.x, mouse.y);
  mouse.worldX = wm.x; mouse.worldY = wm.y;
  player.aimAngle = Math.atan2(wm.y - player.y, wm.x - player.x);

  // Fire
  player.fireTimer -= dt;
  player.gunRecoil = Math.max(0, player.gunRecoil - 8 * dt);
  if (mouse.down && player.fireTimer <= 0) {
    player.fireTimer = player.fireRate;
    player.gunRecoil = 1.0;
    const gunLen = 14 - player.gunRecoil * 2;
    const bx = player.x + Math.cos(player.aimAngle) * gunLen;
    const by = player.y + Math.sin(player.aimAngle) * gunLen;
    bullets.push(createBullet(bx, by, player.aimAngle, 500, 20, '#0FF', 600, 'player'));
    spawnMuzzleFlash(bx, by, player.aimAngle);
    spawnParticles(bx, by, 3, ['#FFF','#FF0','#0FF'], 80, 0.1, 3);
  }

  if (player.iframes > 0) player.iframes -= dt;
}

function renderPlayer(player) {
  if (!player.alive) return;
  if (player.iframes > 0 && Math.floor(player.iframes * 10) % 2 === 0) return;

  const { x, y } = worldToScreen(player.x, player.y);
  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(2, 4, 10, 6, 0, 0, Math.PI*2);
  ctx.fill();

  // Legs
  const legBob = Math.sin(player.walkCycle) * 4;
  ctx.fillStyle = '#27F';
  ctx.fillRect(-6, 4, 5, 8 + (legBob > 0 ? legBob : 0));
  ctx.fillRect(1, 4, 5, 8 + (legBob < 0 ? -legBob : 0));

  // Body
  ctx.fillStyle = '#4AF';
  roundRect(ctx, -8, -8, 16, 16, 3);
  ctx.fill();

  // Chest detail
  ctx.fillStyle = '#27F';
  ctx.fillRect(-3, -5, 6, 4);

  // Head
  ctx.fillStyle = '#FA8';
  ctx.beginPath();
  ctx.arc(0, -8, 6, 0, Math.PI * 2);
  ctx.fill();
  // Visor
  ctx.fillStyle = '#0CF';
  ctx.fillRect(-4, -11, 8, 4);

  // Gun
  ctx.rotate(player.aimAngle);
  const recoilOffset = player.gunRecoil * 3;
  ctx.fillStyle = '#888';
  ctx.fillRect(4 - recoilOffset, -2, 12, 4);
  ctx.fillStyle = '#AAA';
  ctx.fillRect(4 - recoilOffset, -1, 12, 2);

  ctx.restore();
}

// ============================================================
// BULLETS
// ============================================================
function createBullet(x, y, angle, speed, damage, color, maxDist, owner) {
  return {
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    damage, color, owner,
    maxDist, distTraveled: 0,
    alive: true,
    trail: []
  };
}

function updateBullets(bullets, dt, obstacles, worldSize) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (!b.alive) { bullets.splice(i, 1); continue; }

    b.trail.unshift({ x: b.x, y: b.y });
    if (b.trail.length > 8) b.trail.pop();

    const dx = b.vx * dt, dy = b.vy * dt;
    b.x += dx; b.y += dy;
    b.distTraveled += Math.sqrt(dx*dx + dy*dy);

    if (b.distTraveled > b.maxDist ||
        b.x < 0 || b.x > worldSize || b.y < 0 || b.y > worldSize) {
      b.alive = false; continue;
    }

    // Obstacle collision
    for (const obs of obstacles) {
      if (b.x > obs.x && b.x < obs.x+obs.w && b.y > obs.y && b.y < obs.y+obs.h) {
        b.alive = false;
        spawnParticles(b.x, b.y, 4, ['#888','#AAA','#FFF'], 60, 0.15, 3);
        break;
      }
    }
  }
}

function renderBullets(bullets) {
  for (const b of bullets) {
    // Trail
    for (let t = 0; t < b.trail.length; t++) {
      const alpha = (1 - t / b.trail.length) * 0.5;
      const size = (1 - t / b.trail.length) * 4;
      const { x, y } = worldToScreen(b.trail[t].x, b.trail[t].y);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = b.color;
      ctx.fillRect(x - size/2, y - size/2, size, size);
    }
    ctx.globalAlpha = 1;

    // Bullet head
    const { x, y } = worldToScreen(b.x, b.y);
    ctx.fillStyle = '#FFF';
    ctx.fillRect(x - 2, y - 2, 4, 4);
    ctx.fillStyle = b.color;
    ctx.fillRect(x - 3, y - 3, 6, 6);
  }
}

// ============================================================
// ENEMIES
// ============================================================
const ENEMY_TYPES = {
  grunt: {
    hp: 30, speed: 80, fireRate: 1.5, size: 18, color: '#F44', darkColor: '#A00',
    score: 100, bulletColor: '#F88', bulletSpeed: 300, bulletDamage: 10,
    chaseRange: 300, strafeRange: 150
  },
  tank: {
    hp: 120, speed: 40, fireRate: 2.5, size: 24, color: '#F84', darkColor: '#840',
    score: 250, bulletColor: '#FC8', bulletSpeed: 220, bulletDamage: 18,
    chaseRange: 400, strafeRange: 180
  },
  speeder: {
    hp: 15, speed: 160, fireRate: 0.8, size: 14, color: '#C4F', darkColor: '#608',
    score: 150, bulletColor: '#E8F', bulletSpeed: 380, bulletDamage: 8,
    chaseRange: 250, strafeRange: 100
  },
  boss: {
    hp: 500, speed: 55, fireRate: 0.9, size: 36, color: '#F22', darkColor: '#700',
    score: 2000, bulletColor: '#F44', bulletSpeed: 260, bulletDamage: 15,
    chaseRange: 500, strafeRange: 200, isBoss: true
  }
};

function createEnemy(type, x, y) {
  const def = ENEMY_TYPES[type];
  return {
    type, x, y, w: def.size, h: def.size,
    hp: def.hp, maxHp: def.hp,
    speed: def.speed,
    fireRate: def.fireRate,
    fireTimer: Math.random() * def.fireRate,
    aimAngle: 0,
    state: 'patrol',
    strafeDir: 1,
    strafeDirTimer: 1 + Math.random() * 2,
    patrolAngle: Math.random() * Math.PI * 2,
    patrolTimer: 0,
    alive: true,
    deadTimer: 0,
    flashTimer: 0,
    hitFlash: 0,
    walkCycle: 0,
    def
  };
}

function updateEnemy(enemy, player, bullets, obstacles, worldSize, dt) {
  if (!enemy.alive) {
    enemy.deadTimer += dt;
    return;
  }

  const dx = player.x - enemy.x, dy = player.y - enemy.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  enemy.aimAngle = Math.atan2(dy, dx);

  // State transitions
  if (dist < enemy.def.chaseRange) enemy.state = 'chase';
  else if (enemy.state === 'chase' && dist > enemy.def.chaseRange * 1.5) enemy.state = 'patrol';

  // Movement
  let mx = 0, my = 0;
  if (enemy.state === 'patrol') {
    enemy.patrolTimer -= dt;
    if (enemy.patrolTimer <= 0) {
      enemy.patrolAngle += (Math.random() - 0.5) * Math.PI;
      enemy.patrolTimer = 1 + Math.random() * 2;
    }
    mx = Math.cos(enemy.patrolAngle) * 0.3;
    my = Math.sin(enemy.patrolAngle) * 0.3;
  } else if (enemy.state === 'chase') {
    if (enemy.type === 'speeder' || enemy.type === 'grunt') {
      // Strafe when close enough
      if (dist < enemy.def.strafeRange) {
        enemy.state = 'strafe';
        enemy.strafeDirTimer -= dt;
        if (enemy.strafeDirTimer <= 0) {
          enemy.strafeDir *= -1;
          enemy.strafeDirTimer = 0.8 + Math.random() * 1.2;
        }
        const perpX = -dy / dist, perpY = dx / dist;
        mx = perpX * enemy.strafeDir + dx / dist * 0.3;
        my = perpY * enemy.strafeDir + dy / dist * 0.3;
      } else {
        mx = dx / dist; my = dy / dist;
      }
    } else if (enemy.type === 'tank' || enemy.type === 'boss') {
      if (dist < enemy.def.strafeRange * 0.7) {
        mx = -dx / dist; my = -dy / dist; // back up
      } else {
        mx = dx / dist; my = dy / dist;
      }
    }
  }

  const spd = enemy.speed * dt;
  enemy.x += mx * spd;
  enemy.y += my * spd;
  if (mx !== 0 || my !== 0) enemy.walkCycle += dt * 6;

  // World bounds
  const half = enemy.w/2;
  enemy.x = Math.max(half, Math.min(worldSize - half, enemy.x));
  enemy.y = Math.max(half, Math.min(worldSize - half, enemy.y));
  resolveEntityObstacle(enemy, obstacles);

  // Firing
  if (dist < enemy.def.chaseRange) {
    enemy.fireTimer -= dt;
    if (enemy.fireTimer <= 0) {
      enemy.fireTimer = enemy.def.fireRate + (Math.random() - 0.5) * 0.3;
      const gunLen = enemy.w * 0.6;
      const bx = enemy.x + Math.cos(enemy.aimAngle) * gunLen;
      const by = enemy.y + Math.sin(enemy.aimAngle) * gunLen;
      // Slight inaccuracy
      const spread = enemy.type === 'speeder' ? 0.15 : 0.05;
      const angle = enemy.aimAngle + (Math.random() - 0.5) * spread;
      bullets.push(createBullet(bx, by, angle, enemy.def.bulletSpeed,
        enemy.def.bulletDamage, enemy.def.bulletColor, 700, 'enemy'));
      spawnMuzzleFlash(bx, by, angle);

      // Boss fires 2 bullets
      if (enemy.def.isBoss) {
        const angle2 = enemy.aimAngle + 0.25;
        const angle3 = enemy.aimAngle - 0.25;
        bullets.push(createBullet(bx, by, angle2, enemy.def.bulletSpeed,
          enemy.def.bulletDamage, enemy.def.bulletColor, 700, 'enemy'));
        bullets.push(createBullet(bx, by, angle3, enemy.def.bulletSpeed,
          enemy.def.bulletDamage, enemy.def.bulletColor, 700, 'enemy'));
      }
    }
  }

  if (enemy.hitFlash > 0) enemy.hitFlash -= dt * 5;
}

function renderEnemy(enemy) {
  const { x, y } = worldToScreen(enemy.x, enemy.y);
  const def = enemy.def;
  const s = enemy.w;

  // Death fade
  if (!enemy.alive) {
    const t = 1 - enemy.deadTimer / 0.4;
    if (t <= 0) return;
    ctx.globalAlpha = t;
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#FFF';
    ctx.fillRect(-s/2, -s/2, s, s);
    ctx.restore();
    ctx.globalAlpha = 1;
    return;
  }

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(2, s/2 + 2, s/2, s/4, 0, 0, Math.PI*2);
  ctx.fill();

  // Hit flash
  const col = enemy.hitFlash > 0 ? '#FFF' : def.color;

  if (enemy.type === 'tank' || enemy.type === 'boss') {
    // Tank: boxy with armor plates
    ctx.fillStyle = def.darkColor;
    ctx.fillRect(-s/2 + 2, -s/2 + 2, s, s);
    ctx.fillStyle = col;
    ctx.fillRect(-s/2, -s/2, s, s);
    // Armor lines
    ctx.fillStyle = def.darkColor;
    ctx.fillRect(-s/2, -s/2 + s/3, s, 3);
    ctx.fillRect(-s/2, -s/2 + s*2/3, s, 3);
    if (enemy.def.isBoss) {
      // Extra boss details
      ctx.fillStyle = '#F00';
      ctx.fillRect(-s/2, -s/2, s, 4);
      ctx.fillRect(-s/2, s/2 - 4, s, 4);
    }
  } else if (enemy.type === 'speeder') {
    // Speeder: diamond shape
    ctx.fillStyle = def.darkColor;
    ctx.beginPath();
    ctx.moveTo(0, -s/2 + 2); ctx.lineTo(s/2 + 2, 0);
    ctx.lineTo(0, s/2 + 2); ctx.lineTo(-s/2 + 2, 0);
    ctx.fill();
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(0, -s/2); ctx.lineTo(s/2, 0);
    ctx.lineTo(0, s/2); ctx.lineTo(-s/2, 0);
    ctx.fill();
  } else {
    // Grunt: rounded square body
    ctx.fillStyle = def.darkColor;
    roundRect(ctx, -s/2 + 2, -s/2 + 2, s, s, 4);
    ctx.fill();
    ctx.fillStyle = col;
    roundRect(ctx, -s/2, -s/2, s, s, 4);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#FFF';
    ctx.fillRect(-s/4 - 2, -s/4, 4, 4);
    ctx.fillRect(s/4 - 2, -s/4, 4, 4);
    ctx.fillStyle = '#F00';
    ctx.fillRect(-s/4, -s/4 + 1, 2, 2);
    ctx.fillRect(s/4, -s/4 + 1, 2, 2);
  }

  // Gun
  ctx.rotate(enemy.aimAngle);
  ctx.fillStyle = '#666';
  ctx.fillRect(s/2 - 4, -2, s/2 + 4, 4);

  // Health bar (only show when damaged)
  if (enemy.hp < enemy.maxHp) {
    ctx.rotate(-enemy.aimAngle);
    const bw = s + 8, bh = 4;
    const bx2 = -bw/2, by2 = -s/2 - 8;
    ctx.fillStyle = '#500';
    ctx.fillRect(bx2, by2, bw, bh);
    ctx.fillStyle = '#0F0';
    ctx.fillRect(bx2, by2, bw * (enemy.hp / enemy.maxHp), bh);
  }

  ctx.restore();
}

// ============================================================
// COLLISION
// ============================================================
function checkCollisions(player, enemies, playerBullets, enemyBullets, obstacles) {
  // Player bullets vs enemies
  for (const b of playerBullets) {
    if (!b.alive || b.owner !== 'player') continue;
    for (const e of enemies) {
      if (!e.alive) continue;
      const hw = e.w/2;
      if (Math.abs(b.x - e.x) < hw && Math.abs(b.y - e.y) < hw) {
        b.alive = false;
        e.hp -= b.damage;
        e.hitFlash = 1;
        spawnParticles(b.x, b.y, 5, ['#F44','#F88','#FFF'], 80, 0.2, 3);
        if (e.hp <= 0) {
          e.alive = false;
          e.deadTimer = 0;
          player.score += e.def.score;
          spawnParticles(e.x, e.y, 16, [e.def.color, e.def.darkColor, '#FFF','#FF0'], 120, 0.6, 6, 80);
          camera.shakeIntensity = e.def.isBoss ? 20 : 8;
        }
        break;
      }
    }
  }

  // Enemy bullets vs player
  if (player.alive && player.iframes <= 0) {
    for (const b of enemyBullets) {
      if (!b.alive || b.owner !== 'enemy') continue;
      if (Math.abs(b.x - player.x) < player.w/2 && Math.abs(b.y - player.y) < player.h/2) {
        b.alive = false;
        player.hp -= b.damage;
        player.iframes = 0.5;
        camera.shakeIntensity = 12;
        spawnParticles(b.x, b.y, 6, ['#F44','#FFF','#FA8'], 100, 0.25, 4);
        if (player.hp <= 0) {
          player.hp = 0;
          player.alive = false;
          spawnParticles(player.x, player.y, 20, ['#4AF','#27F','#FFF','#FF0'], 150, 0.8, 7, 80);
          camera.shakeIntensity = 25;
        }
      }
    }
  }

  // Enemy contact damage
  if (player.alive && player.iframes <= 0) {
    for (const e of enemies) {
      if (!e.alive) continue;
      const dist = Math.sqrt((player.x-e.x)**2 + (player.y-e.y)**2);
      if (dist < (player.w + e.w) / 2) {
        player.hp -= 0.5;
        player.iframes = 0.3;
        camera.shakeIntensity = 5;
        if (player.hp <= 0) {
          player.hp = 0;
          player.alive = false;
          spawnParticles(player.x, player.y, 20, ['#4AF','#27F','#FFF','#FF0'], 150, 0.8, 7, 80);
          camera.shakeIntensity = 25;
        }
      }
    }
  }
}

// ============================================================
// HUD
// ============================================================
function renderHUD(player, level, waveIndex, waveBanner) {
  // Health bar
  const seg = 20;
  const segW = 14, segH = 16, gap = 2;
  const hpPct = player.hp / player.maxHp;
  for (let i = 0; i < seg; i++) {
    const t = i / seg;
    let color;
    if (t >= hpPct) {
      color = '#333';
    } else if (hpPct > 0.5) {
      color = '#0D0';
    } else if (hpPct > 0.25) {
      color = '#DD0';
    } else {
      // Blink when critical
      color = Math.floor(Date.now() / 200) % 2 === 0 ? '#F00' : '#800';
    }
    const x = 16 + i * (segW + gap), y = H - 30;
    ctx.fillStyle = '#111';
    ctx.fillRect(x - 1, y - 1, segW + 2, segH + 2);
    ctx.fillStyle = color;
    ctx.fillRect(x, y, segW, segH);
  }

  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP', 16, H - 35);

  // Score
  ctx.textAlign = 'right';
  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = '#FF0';
  ctx.fillText(String(player.score).padStart(8, '0'), W - 16, 30);

  // Level
  ctx.textAlign = 'center';
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#AAA';
  ctx.fillText(`LEVEL ${level.id}  WAVE ${waveIndex + 1}/${level.waves.length}`, W/2, 20);

  // Wave banner
  if (waveBanner.alpha > 0) {
    ctx.globalAlpha = waveBanner.alpha;
    ctx.fillStyle = '#FF0';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(waveBanner.text, W/2, H/2 - 40);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// BACKGROUND RENDERING
// ============================================================
function renderBackground(level) {
  const ws = level.worldSize;
  const sx = Math.round(-camera.x + camera.shakeX);
  const sy = Math.round(-camera.y + camera.shakeY);

  // Floor
  ctx.fillStyle = level.floorColor;
  ctx.fillRect(sx, sy, ws, ws);

  // Grid
  const gridSize = 64;
  ctx.strokeStyle = level.gridColor;
  ctx.lineWidth = 1;
  const startX = Math.floor(camera.x / gridSize) * gridSize;
  const startY = Math.floor(camera.y / gridSize) * gridSize;
  for (let gx = startX; gx < camera.x + W; gx += gridSize) {
    const { x } = worldToScreen(gx, 0);
    if (x < 0 || x > W) continue;
    ctx.beginPath();
    ctx.moveTo(x, Math.max(0, sy));
    ctx.lineTo(x, Math.min(H, sy + ws));
    ctx.stroke();
  }
  for (let gy = startY; gy < camera.y + H; gy += gridSize) {
    const { y } = worldToScreen(0, gy);
    if (y < 0 || y > H) continue;
    ctx.beginPath();
    ctx.moveTo(Math.max(0, sx), y);
    ctx.lineTo(Math.min(W, sx + ws), y);
    ctx.stroke();
  }

  // World border
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 3;
  ctx.strokeRect(sx + 1, sy + 1, ws - 2, ws - 2);
}

// ============================================================
// HELPERS
// ============================================================
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============================================================
// GAME STATE
// ============================================================
let state = 'TITLE';
let player, bullets, enemies, levelIndex, waveIndex, waveBanner;
let levelCompleteTimer = 0;
let winGame = false;

function initGame() {
  levelIndex = 0;
  player = createPlayer(200, 200);
  bullets = [];
  enemies = [];
  particles.length = 0;
  muzzleFlashes.length = 0;
  camera.x = 0; camera.y = 0;
  camera.shakeIntensity = 0;
  spawnWave();
}

function spawnWave() {
  const level = LEVELS[levelIndex];
  const wave = level.waves[waveIndex];
  for (const ed of wave.enemies) {
    enemies.push(createEnemy(ed.type, ed.x, ed.y));
  }
  waveBanner = {
    text: waveIndex === 0 ? `LEVEL ${level.id}` : `WAVE ${waveIndex + 1}`,
    alpha: 1
  };
}

function startLevel() {
  const level = LEVELS[levelIndex];
  waveIndex = 0;
  enemies = [];
  bullets = bullets.filter(b => b.owner === 'player'); // keep player bullets
  bullets = [];
  particles.length = 0;
  player.x = 200; player.y = 200;
  camera.x = 0; camera.y = 0;
  spawnWave();
  state = 'PLAYING';
}

// ============================================================
// UPDATE / RENDER STATE FUNCTIONS
// ============================================================

// --- TITLE ---
let titleBlink = 0;
function updateTitle(dt) {
  titleBlink += dt;
  if (keys.has('Enter') || keys.has('Space')) {
    keys.delete('Enter'); keys.delete('Space');
    initGame();
    state = 'PLAYING';
  }
}

function renderTitle() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Scanlines
  for (let sy = 0; sy < H; sy += 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, sy, W, 2);
  }

  ctx.textAlign = 'center';
  // Title
  ctx.font = 'bold 64px monospace';
  ctx.fillStyle = '#F00';
  ctx.fillText('TOP-DOWN', W/2 + 2, 160 + 2);
  ctx.fillText('TOP-DOWN', W/2, 160);
  ctx.font = 'bold 72px monospace';
  ctx.fillStyle = '#FF0';
  ctx.fillText('SHOOTER', W/2 + 2, 240 + 2);
  ctx.fillStyle = '#FFF';
  ctx.fillText('SHOOTER', W/2, 240);

  ctx.font = '16px monospace';
  ctx.fillStyle = '#AAA';
  ctx.fillText('WASD / ARROWS: Move   MOUSE: Aim   CLICK: Fire', W/2, 310);

  // Blink
  if (Math.floor(titleBlink * 2) % 2 === 0) {
    ctx.font = 'bold 24px monospace';
    ctx.fillStyle = '#0F0';
    ctx.fillText('PRESS ENTER TO START', W/2, 380);
  }

  ctx.font = '13px monospace';
  ctx.fillStyle = '#666';
  ctx.fillText('5 LEVELS  |  3 ENEMY TYPES  |  BOSS FIGHT', W/2, 450);
}

// --- PLAYING ---
function updatePlaying(dt) {
  const level = LEVELS[levelIndex];

  // Separate bullets
  const playerBullets = bullets.filter(b => b.owner === 'player');
  const enemyBullets = bullets.filter(b => b.owner === 'enemy');

  updatePlayer(player, dt, playerBullets, level.obstacles, level.worldSize);
  for (const e of enemies) {
    updateEnemy(e, player, enemyBullets, level.obstacles, level.worldSize, dt);
  }

  // Rebuild bullet array
  bullets = [...playerBullets, ...enemyBullets];
  updateBullets(bullets, dt, level.obstacles, level.worldSize);
  updateParticles(dt);
  updateMuzzleFlashes(dt);
  cameraUpdate(player, level.worldSize);

  // Wave banner fade
  if (waveBanner && waveBanner.alpha > 0) {
    waveBanner.alpha -= dt / 1.5;
  }

  checkCollisions(player, enemies, playerBullets, enemyBullets, level.obstacles);

  // Check wave clear
  const aliveEnemies = enemies.filter(e => e.alive);
  const deadAnimDone = enemies.filter(e => !e.alive && e.deadTimer < 0.4);
  if (aliveEnemies.length === 0 && deadAnimDone.length === 0 && enemies.length > 0) {
    enemies = enemies.filter(e => e.alive || e.deadTimer < 0.4);
    // Advance wave
    waveIndex++;
    if (waveIndex < level.waves.length) {
      enemies = [];
      spawnWave();
    } else {
      // Level complete
      if (levelIndex < LEVELS.length - 1) {
        state = 'LEVEL_COMPLETE';
        levelCompleteTimer = 3;
        waveBanner = { text: 'LEVEL COMPLETE!', alpha: 1 };
      } else {
        state = 'WIN';
        winGame = true;
      }
    }
  }

  // Game over
  if (!player.alive && particles.filter(p => p.life > 0).length < 2) {
    state = 'GAME_OVER';
  }
}

function renderPlaying() {
  const level = LEVELS[levelIndex];
  renderBackground(level);
  renderObstacles(level.obstacles, level.bgColor);
  renderParticles();
  renderBullets(bullets);
  for (const e of enemies) renderEnemy(e);
  renderPlayer(player);
  renderMuzzleFlashes();
  renderHUD(player, level, waveIndex > level.waves.length - 1 ? level.waves.length - 1 : waveIndex, waveBanner || {alpha:0});
}

// --- LEVEL COMPLETE ---
function updateLevelComplete(dt) {
  levelCompleteTimer -= dt;
  if (levelCompleteTimer <= 0) {
    levelIndex++;
    player.hp = Math.min(player.maxHp, player.hp + 40); // heal between levels
    startLevel();
  }
}

function renderLevelComplete() {
  renderPlaying();
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 56px monospace';
  ctx.fillStyle = '#FF0';
  ctx.fillText('LEVEL COMPLETE!', W/2, H/2 - 30);
  ctx.font = '20px monospace';
  ctx.fillStyle = '#0F0';
  ctx.fillText(`Score: ${player.score}`, W/2, H/2 + 20);
  ctx.fillStyle = '#AAA';
  ctx.fillText(`Next level in ${Math.ceil(levelCompleteTimer)}...`, W/2, H/2 + 55);
}

// --- GAME OVER ---
let gameOverBlink = 0;
function updateGameOver(dt) {
  gameOverBlink += dt;
  if (keys.has('Enter') || keys.has('Space')) {
    keys.delete('Enter'); keys.delete('Space');
    state = 'TITLE';
  }
}

function renderGameOver() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  for (let sy = 0; sy < H; sy += 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, sy, W, 2);
  }
  ctx.textAlign = 'center';
  ctx.font = 'bold 72px monospace';
  ctx.fillStyle = '#F00';
  ctx.fillText('GAME OVER', W/2 + 3, H/2 - 40 + 3);
  ctx.fillStyle = '#FF4444';
  ctx.fillText('GAME OVER', W/2, H/2 - 40);
  ctx.font = '22px monospace';
  ctx.fillStyle = '#FFF';
  ctx.fillText(`FINAL SCORE: ${player ? player.score : 0}`, W/2, H/2 + 20);
  if (Math.floor(gameOverBlink * 2) % 2 === 0) {
    ctx.font = 'bold 18px monospace';
    ctx.fillStyle = '#0F0';
    ctx.fillText('PRESS ENTER TO CONTINUE', W/2, H/2 + 70);
  }
}

// --- WIN ---
let winBlink = 0;
function updateWin(dt) {
  winBlink += dt;
  if (keys.has('Enter') || keys.has('Space')) {
    keys.delete('Enter'); keys.delete('Space');
    state = 'TITLE';
  }
}

function renderWin() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  for (let sy = 0; sy < H; sy += 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, sy, W, 2);
  }
  ctx.textAlign = 'center';
  // Animated stars
  for (let i = 0; i < 60; i++) {
    const t = (winBlink * 0.3 + i * 0.17) % 1;
    const x = (Math.sin(i * 2.4) * 0.5 + 0.5) * W;
    const y = (Math.cos(i * 1.7) * 0.5 + 0.5) * H;
    ctx.fillStyle = `hsl(${(i * 30 + winBlink * 60) % 360}, 100%, ${50 + t * 30}%)`;
    ctx.fillRect(x, y, 3, 3);
  }
  ctx.font = 'bold 64px monospace';
  ctx.fillStyle = '#FF0';
  ctx.fillText('YOU WIN!', W/2 + 3, H/2 - 60 + 3);
  ctx.fillStyle = '#FFF';
  ctx.fillText('YOU WIN!', W/2, H/2 - 60);
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = '#0FF';
  ctx.fillText('ALL 5 LEVELS CLEARED!', W/2, H/2);
  ctx.font = '22px monospace';
  ctx.fillStyle = '#FF0';
  ctx.fillText(`FINAL SCORE: ${player ? player.score : 0}`, W/2, H/2 + 50);
  if (Math.floor(winBlink * 2) % 2 === 0) {
    ctx.font = 'bold 18px monospace';
    ctx.fillStyle = '#0F0';
    ctx.fillText('PRESS ENTER TO PLAY AGAIN', W/2, H/2 + 100);
  }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  switch (state) {
    case 'TITLE':
      updateTitle(dt);
      renderTitle();
      break;
    case 'PLAYING':
      updatePlaying(dt);
      renderPlaying();
      break;
    case 'LEVEL_COMPLETE':
      updateLevelComplete(dt);
      renderLevelComplete();
      break;
    case 'GAME_OVER':
      updateGameOver(dt);
      renderGameOver();
      break;
    case 'WIN':
      updateWin(dt);
      renderWin();
      break;
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
